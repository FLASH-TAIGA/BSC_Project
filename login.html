<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/avif" href="image/fl5.jpg">
    <script src="theme.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="proj.css">
    <link rel="stylesheet" href="theme.css">
    <link href="libs/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="libs/fontawesome/css/all.min.css">
    <title>FL - Login</title>
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a2a4b 0%, #2d6a4f 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1.5rem;
        }
        .auth-box {
            display: flex;
            width: 100%;
            max-width: 820px;
            min-height: 520px;
            border-radius: 1.5rem;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        }
        /* LEFT — image panel */
        .auth-img {
            width: 42%;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }
        .auth-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center top;
            display: block;
        }
        .auth-img-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(15,52,96,0.85) 0%, rgba(0,0,0,0.1) 60%);
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            padding: 1.75rem;
        }
        .auth-img-overlay h3 {
            color: #fff;
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 0.4rem;
        }
        .auth-img-overlay p {
            color: rgba(255,255,255,0.75);
            font-size: 0.85rem;
            margin: 0;
        }
        /* RIGHT — form panel */
        .auth-form {
            flex: 1;
            background: url('image/premium_photo-1776144962182-bc960dd1a1ab.avif') center/cover no-repeat;
            padding: 2.5rem 2rem;
            display: flex;
            flex-direction: column;
            justify-content: center;
            overflow-y: auto;
            position: relative;
        }
        .auth-form::before {
            content: '';
            position: absolute;
            inset: 0;
            background: rgba(255,255,255,0.55);
        }
        .auth-form > * { position: relative; z-index: 1; }
        .auth-logo {
            font-size: 2rem;
            font-weight: 700;
            text-decoration: none;
            display: inline-block;
            background: url('image/photo-1742869028491-7cc55dd8e213.avif') center/cover;
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
            animation: animateLogo 10s linear infinite;
        }
        @keyframes animateLogo { to { background-position: -200px; } }

        @media (max-width: 640px) {
            .auth-img { display: none; }
            .auth-box { max-width: 420px; }
        }
    </style>
</head>
<body>

<div class="auth-box">
    <!-- LEFT: image -->
    <div class="auth-img">
        <img src="image/face.avif" alt="Flash Learning">
        <div class="auth-img-overlay">
            <h3>Welcome Back</h3>
            <p>Sign in to access your sessions, notes, and tutors.</p>
        </div>
    </div>

    <!-- RIGHT: form -->
    <div class="auth-form">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <a href="index.html" class="auth-logo"><span>~</span>FLASH LEARNING<span>~</span></a>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme"><i class="fas fa-moon icon-moon"></i><i class="fas fa-sun icon-sun"></i></button>
        </div>
        <h5 class="fw-bold mb-1">Sign in</h5>
        <p class="text-muted small mb-4">Enter your credentials to continue</p>
        <div id="loginError" class="alert alert-danger d-none"></div>
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label fw-semibold small">Email Address</label>
                <input type="email" id="loginEmail" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold small">Password</label>
                <div class="input-group">
                    <input type="password" id="loginPassword" class="form-control" placeholder="••••••••" required>
                    <button class="btn btn-outline-secondary" type="button" onclick="togglePwd('loginPassword')"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <button type="submit" class="btn moodle-btn-primary w-100 py-2 fw-semibold">Log In</button>
        </form>
        <hr class="my-3">
        <p class="text-center small mb-1">Don't have an account? <a href="signup.html" class="text-success fw-semibold">Sign Up</a></p>
        <p class="text-center small mb-1"><a href="index.html" class="text-muted"><i class="fas fa-arrow-left me-1"></i>Back to Home</a></p>
        <p class="text-center" style="font-size:0.75rem;">
            <a href="terms.html" target="_blank" class="text-muted">Terms</a> &nbsp;|&nbsp;
            <a href="privacy.html" target="_blank" class="text-muted">Privacy</a>
        </p>
    </div>
</div>

<script src="libs/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="auth.js"></script>
<script>
    const existing = getCurrentUser();
    if (existing) redirectToDashboard(existing.role);

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        handleLogin(
            document.getElementById('loginEmail').value.trim(),
            document.getElementById('loginPassword').value
        );
    });

    function togglePwd(id) {
        const el = document.getElementById(id);
        el.type = el.type === 'password' ? 'text' : 'password';
    }
</script>
</body>
</html>
