<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="theme.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="proj.css">
    <link rel="stylesheet" href="theme.css">
    <link href="libs/bootstrap/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="libs/fontawesome/css/all.min.css">
    <title>FL - Sign Up</title>
    <style>
        html, body { height: 100%; overflow: hidden; margin: 0; padding: 0; }
        body {
            background: linear-gradient(135deg, #1a2a4b 0%, #2d6a4f 100%);
            display: flex; align-items: center; justify-content: center;
            padding: 0.75rem;
        }
        .auth-box {
            display: flex; width: 100%; max-width: 800px;
            height: calc(100vh - 1.5rem); max-height: 660px;
            border-radius: 1.25rem; overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        }
        .auth-img {
            width: 38%; flex-shrink: 0; position: relative; overflow: hidden;
        }
        .auth-img img {
            width: 100%; height: 100%; object-fit: cover;
            object-position: center top; display: block;
        }
        .auth-img-overlay {
            position: absolute; inset: 0;
            background: linear-gradient(to top, rgba(15,52,96,0.85) 0%, rgba(0,0,0,0.1) 60%);
            display: flex; flex-direction: column; justify-content: flex-end; padding: 1.25rem;
        }
        .auth-img-overlay h3 { color:#fff; font-size:1.1rem; font-weight:700; margin-bottom:0.25rem; }
        .auth-img-overlay p  { color:rgba(255,255,255,0.75); font-size:0.78rem; margin:0; }
        .auth-form {
            flex: 1;
            background: url('image/premium_photo-1776144962182-bc960dd1a1ab.avif') center/cover no-repeat;
            padding: 1.25rem 1.5rem;
            display: flex; flex-direction: column; justify-content: center;
            overflow: hidden; position: relative;
        }
        .auth-form::before {
            content: ''; position: absolute; inset: 0;
            background: rgba(255,255,255,0.55);
        }
        .auth-form > * { position: relative; z-index: 1; }
        .auth-logo {
            font-size: 2rem; font-weight: 700; text-decoration: none; display: inline-block;
            background: url('image/photo-1742869028491-7cc55dd8e213.avif') center/cover;
            background-clip: text; -webkit-background-clip: text;
            color: transparent; -webkit-text-fill-color: transparent;
            animation: animateLogo 10s linear infinite;
        }
        @keyframes animateLogo { to { background-position: -200px; } }
        .role-card {
            border: 2px solid #dee2e6; border-radius: 0.6rem;
            padding: 0.4rem 0.3rem; cursor: pointer; transition: all 0.2s; text-align: center;
        }
        .role-card:hover, .role-card.selected { border-color:#4CAF50; background:#f0f8f0; }
        .form-control { padding: 0.3rem 0.65rem; font-size: 0.85rem; }
        .form-label { margin-bottom: 0.15rem; font-size: 0.8rem; }
        .btn { font-size: 0.88rem; }
        @media (max-width: 640px) {
            html, body { overflow: auto; height: auto; }
            .auth-img { display: none; }
            .auth-box { max-width: 420px; height: auto; max-height: none; }
        }
    </style>
</head>
<body>
<div class="auth-box">
    <div class="auth-img">
        <img src="image/face2.avif" alt="Flash Learning">
        <div class="auth-img-overlay">
            <h3>Join Flash Learning</h3>
            <p>Connect with expert tutors and take control of your academic journey.</p>
        </div>
    </div>
    <div class="auth-form">
        <div class="d-flex justify-content-between align-items-center mb-2">
            <a href="index.html" class="auth-logo"><span>~</span>FLASH LEARNING<span>~</span></a>
            <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme"><i class="fas fa-moon icon-moon"></i><i class="fas fa-sun icon-sun"></i></button>
        </div>
        <h6 class="fw-bold mb-0">Create your account</h6>
        <p class="text-muted mb-2" style="font-size:0.78rem;">Fill in the details below to get started</p>
        <div id="signupError" class="alert alert-danger d-none py-1 mb-2" style="font-size:0.82rem;"></div>
        <form id="signupForm">
            <div class="mb-2">
                <label class="form-label fw-semibold">Full Name</label>
                <input type="text" id="signupName" class="form-control" placeholder="Your full name" required>
            </div>
            <div class="mb-2">
                <label class="form-label fw-semibold">Email Address</label>
                <input type="email" id="signupEmail" class="form-control" placeholder="you@example.com" required>
            </div>
            <div class="mb-2">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <input type="password" id="signupPassword" class="form-control" placeholder="Min. 6 characters" required minlength="6">
                    <button class="btn btn-outline-secondary btn-sm" type="button" onclick="togglePwd('signupPassword')"><i class="fas fa-eye"></i></button>
                </div>
            </div>
            <div class="mb-2">
                <label class="form-label fw-semibold">I am joining as a...</label>
                <div class="row g-2">
                    <div class="col-6">
                        <label class="role-card d-block" id="roleStudent" onclick="selectRole('student')">
                            <i class="fas fa-user-graduate text-primary d-block mb-1"></i>
                            <strong style="font-size:0.82rem;">Student</strong>
                            <p class="text-muted mb-0" style="font-size:0.7rem;">Access notes &amp; book sessions</p>
                        </label>
                    </div>
                    <div class="col-6">
                        <label class="role-card d-block" id="roleTutor" onclick="selectRole('tutor')">
                            <i class="fas fa-chalkboard-teacher text-success d-block mb-1"></i>
                            <strong style="font-size:0.82rem;">Tutor</strong>
                            <p class="text-muted mb-0" style="font-size:0.7rem;">Teach &amp; manage sessions</p>
                        </label>
                    </div>
                </div>
                <input type="hidden" id="selectedRole" value="student">
            </div>
            <button type="submit" class="btn moodle-btn-primary w-100 py-2 fw-semibold">Create Account</button>
            <p class="text-center text-muted mt-1 mb-0" style="font-size:0.72rem;">
                By signing up you agree to our <a href="terms.html" target="_blank" class="text-success fw-semibold">Terms of Use</a>.
            </p>
        </form>
        <hr class="my-2">
        <p class="text-center mb-1" style="font-size:0.82rem;">Already have an account? <a href="login.html" class="text-success fw-semibold">Log In</a></p>
        <p class="text-center mb-0" style="font-size:0.75rem;">
            <a href="index.html" class="text-muted me-2"><i class="fas fa-arrow-left me-1"></i>Home</a>
            <a href="terms.html" target="_blank" class="text-muted me-2">Terms</a>
            <a href="privacy.html" target="_blank" class="text-muted">Privacy</a>
        </p>
    </div>
</div>
<script src="libs/bootstrap/js/bootstrap.bundle.min.js"></script>
<script src="auth.js"></script>
<script>
    const existing = getCurrentUser();
    if (existing) redirectToDashboard(existing.role);
    selectRole('student');
    function selectRole(role) {
        document.getElementById('selectedRole').value = role;
        document.getElementById('roleStudent').classList.toggle('selected', role === 'student');
        document.getElementById('roleTutor').classList.toggle('selected', role === 'tutor');
    }
    function togglePwd(id) {
        const el = document.getElementById(id);
        el.type = el.type === 'password' ? 'text' : 'password';
    }
    document.getElementById('signupForm').addEventListener('submit', function(e) {
        e.preventDefault();
        handleSignup(
            document.getElementById('signupName').value.trim(),
            document.getElementById('signupEmail').value.trim(),
            document.getElementById('signupPassword').value,
            document.getElementById('selectedRole').value
        );
    });
</script>
</body>
</html>
